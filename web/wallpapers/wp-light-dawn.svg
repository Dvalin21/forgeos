<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="dawn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f5f0eb"/>
      <stop offset="40%"  stop-color="#ede5d8"/>
      <stop offset="100%" stop-color="#e0d4c4"/>
    </linearGradient>
    <linearGradient id="sunRay" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f07020" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f07020" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="metalShape" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#d8c8b0"/>
      <stop offset="50%"  stop-color="#c4b098"/>
      <stop offset="100%" stop-color="#b09880"/>
    </linearGradient>
    <linearGradient id="hotEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e85d04" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#e85d04" stop-opacity="0.7"/>
      <stop offset="60%"  stop-color="#ff9a00" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e85d04" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="warmGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#f07020" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f07020" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow4">
      <feDropShadow dx="4" dy="8" stdDeviation="12" flood-color="#8a6040" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#dawn)"/>

  <!-- Warm glow center -->
  <ellipse cx="960" cy="460" rx="800" ry="500" fill="url(#warmGlow)"/>

  <!-- Sun ray diagonals (subtle) -->
  <g opacity="0.07">
    <polygon points="960,400 0,0 200,0"     fill="#f07020"/>
    <polygon points="960,400 0,0 0,200"     fill="#f07020"/>
    <polygon points="960,400 1920,0 1720,0" fill="#f07020"/>
    <polygon points="960,400 1920,0 1920,200" fill="#f07020"/>
  </g>

  <!-- Subtle dot grid -->
  <g fill="#c4a880" opacity="0.3">
    <!-- Row 1 -->
    <circle cx="200"  cy="150" r="1.5"/> <circle cx="400"  cy="150" r="1.5"/>
    <circle cx="600"  cy="150" r="1.5"/> <circle cx="800"  cy="150" r="1.5"/>
    <circle cx="1000" cy="150" r="1.5"/> <circle cx="1200" cy="150" r="1.5"/>
    <circle cx="1400" cy="150" r="1.5"/> <circle cx="1600" cy="150" r="1.5"/>
    <circle cx="1800" cy="150" r="1.5"/>
    <!-- Row 2 -->
    <circle cx="100"  cy="300" r="1.5"/> <circle cx="300"  cy="300" r="1.5"/>
    <circle cx="500"  cy="300" r="1.5"/> <circle cx="700"  cy="300" r="1.5"/>
    <circle cx="900"  cy="300" r="1.5"/> <circle cx="1100" cy="300" r="1.5"/>
    <circle cx="1300" cy="300" r="1.5"/> <circle cx="1500" cy="300" r="1.5"/>
    <circle cx="1700" cy="300" r="1.5"/> <circle cx="1900" cy="300" r="1.5"/>
    <!-- Row 3 -->
    <circle cx="200"  cy="450" r="1.5"/> <circle cx="400"  cy="450" r="1.5"/>
    <circle cx="600"  cy="450" r="1.5"/> <circle cx="800"  cy="450" r="1.5"/>
    <circle cx="1000" cy="450" r="1.5"/> <circle cx="1200" cy="450" r="1.5"/>
    <circle cx="1400" cy="450" r="1.5"/> <circle cx="1600" cy="450" r="1.5"/>
    <circle cx="1800" cy="450" r="1.5"/>
    <!-- Row 4 -->
    <circle cx="100"  cy="600" r="1.5"/> <circle cx="300"  cy="600" r="1.5"/>
    <circle cx="500"  cy="600" r="1.5"/> <circle cx="700"  cy="600" r="1.5"/>
    <circle cx="900"  cy="600" r="1.5"/> <circle cx="1100" cy="600" r="1.5"/>
    <circle cx="1300" cy="600" r="1.5"/> <circle cx="1500" cy="600" r="1.5"/>
    <circle cx="1700" cy="600" r="1.5"/> <circle cx="1900" cy="600" r="1.5"/>
    <!-- Row 5 -->
    <circle cx="200"  cy="750" r="1.5"/> <circle cx="400"  cy="750" r="1.5"/>
    <circle cx="600"  cy="750" r="1.5"/> <circle cx="800"  cy="750" r="1.5"/>
    <circle cx="1000" cy="750" r="1.5"/> <circle cx="1200" cy="750" r="1.5"/>
    <circle cx="1400" cy="750" r="1.5"/> <circle cx="1600" cy="750" r="1.5"/>
    <circle cx="1800" cy="750" r="1.5"/>
    <!-- Row 6 -->
    <circle cx="100"  cy="900" r="1.5"/> <circle cx="300"  cy="900" r="1.5"/>
    <circle cx="500"  cy="900" r="1.5"/> <circle cx="700"  cy="900" r="1.5"/>
    <circle cx="900"  cy="900" r="1.5"/> <circle cx="1100" cy="900" r="1.5"/>
    <circle cx="1300" cy="900" r="1.5"/> <circle cx="1500" cy="900" r="1.5"/>
    <circle cx="1700" cy="900" r="1.5"/> <circle cx="1900" cy="900" r="1.5"/>
  </g>

  <!-- Large abstract forge gear / cog (left center) -->
  <g transform="translate(340,400)" filter="url(#shadow4)" opacity="0.18">
    <circle cx="0" cy="0" r="220" fill="url(#metalShape)" stroke="#a09080" stroke-width="2"/>
    <circle cx="0" cy="0" r="140" fill="#e0d4c4"/>
    <circle cx="0" cy="0" r="60"  fill="url(#metalShape)" stroke="#a09080" stroke-width="1.5"/>
    <!-- Gear teeth -->
    <rect x="-15" y="-235" width="30" height="40" fill="url(#metalShape)" rx="4"/>
    <rect x="-15" y="195"  width="30" height="40" fill="url(#metalShape)" rx="4" transform="rotate(0)"/>
    <g transform="rotate(30)"><rect x="-15" y="-235" width="30" height="40" fill="url(#metalShape)" rx="4"/></g>
    <g transform="rotate(60)"><rect x="-15" y="-235" width="30" height="40" fill="url(#metalShape)" rx="4"/></g>
    <g transform="rotate(90)"><rect x="-15" y="-235" width="30" height="40" fill="url(#metalShape)" rx="4"/></g>
    <g transform="rotate(120)"><rect x="-15" y="-235" width="30" height="40" fill="url(#metalShape)" rx="4"/></g>
    <g transform="rotate(150)"><rect x="-15" y="-235" width="30" height="40" fill="url(#metalShape)" rx="4"/></g>
    <g transform="rotate(180)"><rect x="-15" y="-235" width="30" height="40" fill="url(#metalShape)" rx="4"/></g>
    <g transform="rotate(210)"><rect x="-15" y="-235" width="30" height="40" fill="url(#metalShape)" rx="4"/></g>
    <g transform="rotate(240)"><rect x="-15" y="-235" width="30" height="40" fill="url(#metalShape)" rx="4"/></g>
    <g transform="rotate(270)"><rect x="-15" y="-235" width="30" height="40" fill="url(#metalShape)" rx="4"/></g>
    <g transform="rotate(300)"><rect x="-15" y="-235" width="30" height="40" fill="url(#metalShape)" rx="4"/></g>
    <g transform="rotate(330)"><rect x="-15" y="-235" width="30" height="40" fill="url(#metalShape)" rx="4"/></g>
  </g>

  <!-- Small gear (right side) -->
  <g transform="translate(1620,320)" filter="url(#shadow4)" opacity="0.14">
    <circle cx="0" cy="0" r="130" fill="url(#metalShape)" stroke="#a09080" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="80"  fill="#ede5d8"/>
    <circle cx="0" cy="0" r="35"  fill="url(#metalShape)" stroke="#a09080" stroke-width="1"/>
    <g transform="rotate(0)"  ><rect x="-10" y="-140" width="20" height="28" fill="url(#metalShape)" rx="3"/></g>
    <g transform="rotate(40)" ><rect x="-10" y="-140" width="20" height="28" fill="url(#metalShape)" rx="3"/></g>
    <g transform="rotate(80)" ><rect x="-10" y="-140" width="20" height="28" fill="url(#metalShape)" rx="3"/></g>
    <g transform="rotate(120)"><rect x="-10" y="-140" width="20" height="28" fill="url(#metalShape)" rx="3"/></g>
    <g transform="rotate(160)"><rect x="-10" y="-140" width="20" height="28" fill="url(#metalShape)" rx="3"/></g>
    <g transform="rotate(200)"><rect x="-10" y="-140" width="20" height="28" fill="url(#metalShape)" rx="3"/></g>
    <g transform="rotate(240)"><rect x="-10" y="-140" width="20" height="28" fill="url(#metalShape)" rx="3"/></g>
    <g transform="rotate(280)"><rect x="-10" y="-140" width="20" height="28" fill="url(#metalShape)" rx="3"/></g>
    <g transform="rotate(320)"><rect x="-10" y="-140" width="20" height="28" fill="url(#metalShape)" rx="3"/></g>
  </g>

  <!-- FORGEOS wordmark - center, large, light treatment -->
  <text x="960" y="530" font-family="'Georgia', serif" font-size="96"
        fill="#c4a880" text-anchor="middle" opacity="0.12" letter-spacing="20"
        font-style="italic">FORGEOS</text>

  <!-- Horizontal rule under wordmark -->
  <rect x="600" y="545" width="720" height="2" fill="url(#hotEdge)" opacity="0.5" rx="1"/>

  <!-- Orange accent corner elements -->
  <g stroke="#e85d04" stroke-width="2" fill="none" opacity="0.45">
    <path d="M40,40 L40,100 M40,40 L100,40"/>
    <circle cx="40" cy="40" r="4" fill="#e85d04" opacity="0.5"/>
    <path d="M1880,40 L1880,100 M1880,40 L1820,40"/>
    <circle cx="1880" cy="40" r="4" fill="#e85d04" opacity="0.5"/>
    <path d="M40,1040 L40,980 M40,1040 L100,1040"/>
    <circle cx="40" cy="1040" r="4" fill="#e85d04" opacity="0.5"/>
    <path d="M1880,1040 L1880,980 M1880,1040 L1820,1040"/>
    <circle cx="1880" cy="1040" r="4" fill="#e85d04" opacity="0.5"/>
  </g>

  <!-- Thin horizontal rule at top and bottom -->
  <rect x="0" y="0"    width="1920" height="3" fill="#e85d04" opacity="0.2"/>
  <rect x="0" y="1077" width="1920" height="3" fill="#e85d04" opacity="0.15"/>
</svg>
