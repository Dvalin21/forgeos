<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bgLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#dce8f0"/>
      <stop offset="50%"  stop-color="#c8d8e8"/>
      <stop offset="100%" stop-color="#b8ccd8"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#e8f0f8"/>
      <stop offset="100%" stop-color="#d0dce8"/>
    </linearGradient>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#6688aa" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgLight)"/>

  <!-- Blueprint grid - fine -->
  <g stroke="#7aa0bc" stroke-width="0.4" opacity="0.25">
    <!-- Vertical lines every 40px -->
    <line x1="0"    y1="0" x2="0"    y2="1080"/>
    <line x1="40"   y1="0" x2="40"   y2="1080"/>
    <line x1="80"   y1="0" x2="80"   y2="1080"/>
    <line x1="120"  y1="0" x2="120"  y2="1080"/>
    <line x1="160"  y1="0" x2="160"  y2="1080"/>
    <line x1="200"  y1="0" x2="200"  y2="1080"/>
    <line x1="240"  y1="0" x2="240"  y2="1080"/>
    <line x1="280"  y1="0" x2="280"  y2="1080"/>
    <line x1="320"  y1="0" x2="320"  y2="1080"/>
    <line x1="360"  y1="0" x2="360"  y2="1080"/>
    <line x1="400"  y1="0" x2="400"  y2="1080"/>
    <line x1="440"  y1="0" x2="440"  y2="1080"/>
    <line x1="480"  y1="0" x2="480"  y2="1080"/>
    <line x1="520"  y1="0" x2="520"  y2="1080"/>
    <line x1="560"  y1="0" x2="560"  y2="1080"/>
    <line x1="600"  y1="0" x2="600"  y2="1080"/>
    <line x1="640"  y1="0" x2="640"  y2="1080"/>
    <line x1="680"  y1="0" x2="680"  y2="1080"/>
    <line x1="720"  y1="0" x2="720"  y2="1080"/>
    <line x1="760"  y1="0" x2="760"  y2="1080"/>
    <line x1="800"  y1="0" x2="800"  y2="1080"/>
    <line x1="840"  y1="0" x2="840"  y2="1080"/>
    <line x1="880"  y1="0" x2="880"  y2="1080"/>
    <line x1="920"  y1="0" x2="920"  y2="1080"/>
    <line x1="960"  y1="0" x2="960"  y2="1080"/>
    <line x1="1000" y1="0" x2="1000" y2="1080"/>
    <line x1="1040" y1="0" x2="1040" y2="1080"/>
    <line x1="1080" y1="0" x2="1080" y2="1080"/>
    <line x1="1120" y1="0" x2="1120" y2="1080"/>
    <line x1="1160" y1="0" x2="1160" y2="1080"/>
    <line x1="1200" y1="0" x2="1200" y2="1080"/>
    <line x1="1240" y1="0" x2="1240" y2="1080"/>
    <line x1="1280" y1="0" x2="1280" y2="1080"/>
    <line x1="1320" y1="0" x2="1320" y2="1080"/>
    <line x1="1360" y1="0" x2="1360" y2="1080"/>
    <line x1="1400" y1="0" x2="1400" y2="1080"/>
    <line x1="1440" y1="0" x2="1440" y2="1080"/>
    <line x1="1480" y1="0" x2="1480" y2="1080"/>
    <line x1="1520" y1="0" x2="1520" y2="1080"/>
    <line x1="1560" y1="0" x2="1560" y2="1080"/>
    <line x1="1600" y1="0" x2="1600" y2="1080"/>
    <line x1="1640" y1="0" x2="1640" y2="1080"/>
    <line x1="1680" y1="0" x2="1680" y2="1080"/>
    <line x1="1720" y1="0" x2="1720" y2="1080"/>
    <line x1="1760" y1="0" x2="1760" y2="1080"/>
    <line x1="1800" y1="0" x2="1800" y2="1080"/>
    <line x1="1840" y1="0" x2="1840" y2="1080"/>
    <line x1="1880" y1="0" x2="1880" y2="1080"/>
    <!-- Horizontal lines every 40px -->
    <line x1="0" y1="40"   x2="1920" y2="40"/>
    <line x1="0" y1="80"   x2="1920" y2="80"/>
    <line x1="0" y1="120"  x2="1920" y2="120"/>
    <line x1="0" y1="160"  x2="1920" y2="160"/>
    <line x1="0" y1="200"  x2="1920" y2="200"/>
    <line x1="0" y1="240"  x2="1920" y2="240"/>
    <line x1="0" y1="280"  x2="1920" y2="280"/>
    <line x1="0" y1="320"  x2="1920" y2="320"/>
    <line x1="0" y1="360"  x2="1920" y2="360"/>
    <line x1="0" y1="400"  x2="1920" y2="400"/>
    <line x1="0" y1="440"  x2="1920" y2="440"/>
    <line x1="0" y1="480"  x2="1920" y2="480"/>
    <line x1="0" y1="520"  x2="1920" y2="520"/>
    <line x1="0" y1="560"  x2="1920" y2="560"/>
    <line x1="0" y1="600"  x2="1920" y2="600"/>
    <line x1="0" y1="640"  x2="1920" y2="640"/>
    <line x1="0" y1="680"  x2="1920" y2="680"/>
    <line x1="0" y1="720"  x2="1920" y2="720"/>
    <line x1="0" y1="760"  x2="1920" y2="760"/>
    <line x1="0" y1="800"  x2="1920" y2="800"/>
    <line x1="0" y1="840"  x2="1920" y2="840"/>
    <line x1="0" y1="880"  x2="1920" y2="880"/>
    <line x1="0" y1="920"  x2="1920" y2="920"/>
    <line x1="0" y1="960"  x2="1920" y2="960"/>
    <line x1="0" y1="1000" x2="1920" y2="1000"/>
    <line x1="0" y1="1040" x2="1920" y2="1040"/>
  </g>

  <!-- Blueprint heavy lines (every 200px) -->
  <g stroke="#5588aa" stroke-width="0.8" opacity="0.3">
    <line x1="0"    y1="200"  x2="1920" y2="200"/>
    <line x1="0"    y1="400"  x2="1920" y2="400"/>
    <line x1="0"    y1="600"  x2="1920" y2="600"/>
    <line x1="0"    y1="800"  x2="1920" y2="800"/>
    <line x1="0"    y1="1000" x2="1920" y2="1000"/>
    <line x1="200"  y1="0"    x2="200"  y2="1080"/>
    <line x1="400"  y1="0"    x2="400"  y2="1080"/>
    <line x1="600"  y1="0"    x2="600"  y2="1080"/>
    <line x1="800"  y1="0"    x2="800"  y2="1080"/>
    <line x1="1000" y1="0"    x2="1000" y2="1080"/>
    <line x1="1200" y1="0"    x2="1200" y2="1080"/>
    <line x1="1400" y1="0"    x2="1400" y2="1080"/>
    <line x1="1600" y1="0"    x2="1600" y2="1080"/>
    <line x1="1800" y1="0"    x2="1800" y2="1080"/>
  </g>

  <!-- Central blueprint drawing - server rack schematic -->
  <g transform="translate(760,160)" filter="url(#dropShadow)">
    <!-- Server rack outline -->
    <rect x="0" y="0" width="400" height="600" fill="url(#panelGrad)" stroke="#4477aa" stroke-width="1.5" rx="4" opacity="0.8"/>
    <!-- Rack units -->
    <rect x="10" y="10"  width="380" height="40" fill="#d0dce8" stroke="#5588aa" stroke-width="0.8" rx="2"/>
    <rect x="10" y="55"  width="380" height="40" fill="#d8e4ee" stroke="#5588aa" stroke-width="0.8" rx="2"/>
    <rect x="10" y="100" width="380" height="40" fill="#d0dce8" stroke="#5588aa" stroke-width="0.8" rx="2"/>
    <rect x="10" y="145" width="380" height="40" fill="#d8e4ee" stroke="#5588aa" stroke-width="0.8" rx="2"/>
    <rect x="10" y="190" width="380" height="80" fill="#c8d8e8" stroke="#4477aa" stroke-width="1" rx="2"/>
    <rect x="10" y="275" width="380" height="40" fill="#d0dce8" stroke="#5588aa" stroke-width="0.8" rx="2"/>
    <rect x="10" y="320" width="380" height="40" fill="#d8e4ee" stroke="#5588aa" stroke-width="0.8" rx="2"/>
    <rect x="10" y="365" width="380" height="40" fill="#d0dce8" stroke="#5588aa" stroke-width="0.8" rx="2"/>
    <!-- Drive bays in large unit -->
    <rect x="20"  y="200" width="50" height="60" fill="#b8c8d8" stroke="#4477aa" stroke-width="0.8" rx="2"/>
    <rect x="75"  y="200" width="50" height="60" fill="#b8c8d8" stroke="#4477aa" stroke-width="0.8" rx="2"/>
    <rect x="130" y="200" width="50" height="60" fill="#b8c8d8" stroke="#4477aa" stroke-width="0.8" rx="2"/>
    <rect x="185" y="200" width="50" height="60" fill="#b8c8d8" stroke="#4477aa" stroke-width="0.8" rx="2"/>
    <rect x="240" y="200" width="50" height="60" fill="#c8e0cc" stroke="#44aa66" stroke-width="0.8" rx="2"/>
    <rect x="295" y="200" width="50" height="60" fill="#c8e0cc" stroke="#44aa66" stroke-width="0.8" rx="2"/>
    <rect x="350" y="200" width="30" height="60" fill="#b8c8d8" stroke="#4477aa" stroke-width="0.8" rx="2"/>
    <!-- Indicator lights on units -->
    <circle cx="370" cy="30"  r="4" fill="#e85d04" opacity="0.7"/>
    <circle cx="382" cy="30"  r="4" fill="#44cc66" opacity="0.7"/>
    <circle cx="370" cy="75"  r="4" fill="#44cc66" opacity="0.7"/>
    <circle cx="382" cy="75"  r="4" fill="#44cc66" opacity="0.7"/>
    <circle cx="370" cy="120" r="4" fill="#44cc66" opacity="0.7"/>
    <!-- Dimension lines -->
    <line x1="-20" y1="0"   x2="-20" y2="600" stroke="#4477aa" stroke-width="0.8"/>
    <line x1="-25" y1="0"   x2="-15" y2="0"   stroke="#4477aa" stroke-width="0.8"/>
    <line x1="-25" y1="600" x2="-15" y2="600" stroke="#4477aa" stroke-width="0.8"/>
    <text x="-35" y="305" font-family="'Courier New', monospace" font-size="9"
          fill="#4477aa" text-anchor="middle" transform="rotate(-90,-35,305)" opacity="0.7">42U</text>
    <!-- Width dimension -->
    <line x1="0"   y1="620" x2="400" y2="620" stroke="#4477aa" stroke-width="0.8"/>
    <line x1="0"   y1="615" x2="0"   y2="625" stroke="#4477aa" stroke-width="0.8"/>
    <line x1="400" y1="615" x2="400" y2="625" stroke="#4477aa" stroke-width="0.8"/>
    <text x="200" y="635" font-family="'Courier New', monospace" font-size="9"
          fill="#4477aa" text-anchor="middle" opacity="0.7">19" STANDARD</text>
  </g>

  <!-- Title block bottom right (blueprint style) -->
  <g transform="translate(1450,880)">
    <rect x="0" y="0" width="440" height="160" fill="#d0dce8" stroke="#4477aa" stroke-width="1" opacity="0.8"/>
    <line x1="0"   y1="40"  x2="440" y2="40"  stroke="#4477aa" stroke-width="0.8"/>
    <line x1="0"   y1="80"  x2="440" y2="80"  stroke="#4477aa" stroke-width="0.8"/>
    <line x1="0"   y1="120" x2="440" y2="120" stroke="#4477aa" stroke-width="0.8"/>
    <line x1="220" y1="40"  x2="220" y2="160" stroke="#4477aa" stroke-width="0.8"/>
    <text x="220" y="26" font-family="'Courier New', monospace" font-size="14"
          fill="#1a3355" text-anchor="middle" font-weight="bold">FORGEOS</text>
    <text x="110" y="65" font-family="'Courier New', monospace" font-size="9"
          fill="#1a3355" text-anchor="middle">SYSTEM DESIGN</text>
    <text x="330" y="65" font-family="'Courier New', monospace" font-size="9"
          fill="#1a3355" text-anchor="middle">v1.0</text>
    <text x="110" y="105" font-family="'Courier New', monospace" font-size="9"
          fill="#1a3355" text-anchor="middle">SERVER RACK</text>
    <text x="330" y="105" font-family="'Courier New', monospace" font-size="9"
          fill="#1a3355" text-anchor="middle">SCALE 1:10</text>
    <text x="110" y="145" font-family="'Courier New', monospace" font-size="9"
          fill="#1a3355" text-anchor="middle">ALL RIGHTS RESERVED</text>
    <text x="330" y="145" font-family="'Courier New', monospace" font-size="9"
          fill="#e85d04" text-anchor="middle" opacity="0.8">CONFIDENTIAL</text>
  </g>

  <!-- Orange accent - corner marks -->
  <g stroke="#e85d04" stroke-width="2" fill="none" opacity="0.5">
    <path d="M30,30 L30,90 M30,30 L90,30"/>
    <path d="M1890,30 L1890,90 M1890,30 L1830,30"/>
    <path d="M30,1050 L30,990 M30,1050 L90,1050"/>
    <path d="M1890,1050 L1890,990 M1890,1050 L1830,1050"/>
  </g>

  <!-- Cross-hair center mark -->
  <g stroke="#4477aa" stroke-width="0.8" opacity="0.3">
    <line x1="940" y1="500" x2="980" y2="500"/>
    <line x1="960" y1="480" x2="960" y2="520"/>
    <circle cx="960" cy="500" r="12" fill="none"/>
    <circle cx="960" cy="500" r="3"  fill="#4477aa" opacity="0.4"/>
  </g>
</svg>
